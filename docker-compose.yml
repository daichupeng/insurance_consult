version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    # Optional: uncomment if you need API key protection locally
    # environment:
    #   - QDRANT__SERVICE__API_KEY=your_development_api_key
